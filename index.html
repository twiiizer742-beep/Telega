<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Clone</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-screen, .chat-screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }
        .active {
            display: flex !important;
        }
        .login-screen {
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        .login-screen h1 {
            margin-bottom: 30px;
            color: #333;
        }
        .login-screen input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }
        .login-screen button {
            width: 100%;
            padding: 15px;
            background: #0088cc;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }
        .chat-header {
            padding: 15px;
            background: #0088cc;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .user-item {
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            border-radius: 10px;
        }
        .user-item:hover {
            background: #f5f5f5;
        }
        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #0088cc;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .chat-area {
            display: none;
            flex-direction: column;
            height: 100%;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f5f5f5;
        }
        .message {
            margin-bottom: 10px;
            display: flex;
        }
        .message.sent {
            justify-content: flex-end;
        }
        .message-content {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            background: white;
        }
        .sent .message-content {
            background: #dcf8c6;
        }
        .input-area {
            padding: 10px;
            display: flex;
            gap: 10px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
        }
        .input-area button {
            padding: 12px 20px;
            background: #0088cc;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        .badge {
            background: red;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 12px;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Login Screen -->
        <div id="loginScreen" class="login-screen active">
            <h1>📱 Telegram Clone</h1>
            <input type="text" id="usernameInput" placeholder="Ваше имя">
            <button onclick="login()">Войти</button>
            <p id="error" style="color: red; margin-top: 10px;"></p>
        </div>

        <!-- Main Screen -->
        <div id="mainScreen" class="chat-screen">
            <div class="chat-header">
                <span id="currentUsername"></span>
                <button onclick="showFriendRequests()">
                    👥 <span id="requestsBadge" class="badge" style="display:none;">0</span>
                </button>
            </div>
            <div id="usersList" class="users-list"></div>
        </div>

        <!-- Chat Screen -->
        <div id="chatScreen" class="chat-area">
            <div class="chat-header">
                <button class="back-btn" onclick="backToUsers()">←</button>
                <span id="chatUsername"></span>
                <span></span>
            </div>
            <div id="messages" class="messages"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Сообщение...">
                <button onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentUser = null;
        let currentChat = null;
        let friendRequests = [];
        let friends = new Map();

        socket.on('connect', () => {
            console.log('✅ Connected to server');
        });

        socket.on('connect_error', (error) => {
            console.error('❌ Connection error:', error);
            document.getElementById('error').textContent = 'Ошибка подключения';
        });

        socket.on('registered', (user) => {
            console.log('✅ Registered:', user);
            currentUser = user;
            document.getElementById('loginScreen').classList.remove('active');
            document.getElementById('mainScreen').classList.add('active');
            document.getElementById('currentUsername').textContent = user.username;
        });

        socket.on('usersList', (users) => {
            console.log('Users list:', users);
            renderUsersList(users);
        });

        socket.on('userJoined', (user) => {
            console.log('User joined:', user);
        });

        socket.on('privateMessage', (data) => {
            console.log('Message received:', data);
            if (currentChat && (currentChat.id === data.from || currentChat.id === data.to)) {
                displayMessage(data);
            }
            updateChatList(data);
        });

        socket.on('newFriendRequest', (data) => {
            friendRequests.push(data);
            updateRequestsBadge();
        });

        socket.on('friendAdded', (user) => {
            friends.set(user.id, true);
            alert(`${user.username} теперь ваш друг!`);
        });

        function login() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) {
                document.getElementById('error').textContent = 'Введите имя';
                return;
            }
            document.getElementById('error').textContent = '';
            socket.emit('register', { username });
        }

        function renderUsersList(users) {
            const list = document.getElementById('usersList');
            list.innerHTML = '';
            
            users.forEach(user => {
                if (user.id === currentUser?.id) return;
                
                const div = document.createElement('div');
                div.className = 'user-item';
                
                const isFriend = friends.has(user.id);
                
                div.innerHTML = `
                    <div class="avatar">${user.username[0].toUpperCase()}</div>
                    <div style="flex: 1;">
                        <div style="font-weight: 600;">${user.username}</div>
                        <div style="font-size: 12px; color: #666;">
                            ${isFriend ? '👥 Друг' : 'Нажмите для общения'}
                        </div>
                    </div>
                    ${!isFriend ? `
                        <button onclick="event.stopPropagation(); sendFriendRequest('${user.id}')" 
                            style="padding: 5px 10px; background: #0088cc; color: white; border: none; border-radius: 15px; cursor: pointer;">
                            + Добавить
                        </button>
                    ` : ''}
                `;
                
                div.addEventListener('click', () => openChat(user));
                list.appendChild(div);
            });
        }

        function sendFriendRequest(userId) {
            socket.emit('sendFriendRequest', { toUserId: userId });
            alert('Заявка отправлена!');
        }

        function openChat(user) {
            currentChat = user;
            document.getElementById('mainScreen').classList.remove('active');
            document.getElementById('chatScreen').style.display = 'flex';
            document.getElementById('chatUsername').textContent = user.username;
            document.getElementById('messages').innerHTML = '';
        }

        function backToUsers() {
            currentChat = null;
            document.getElementById('chatScreen').style.display = 'none';
            document.getElementById('mainScreen').classList.add('active');
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || !currentChat) return;
            
            socket.emit('privateMessage', {
                to: currentChat.id,
                message: message
            });
            
            input.value = '';
            input.focus();
        }

        function displayMessage(data) {
            const messagesDiv = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${data.from === currentUser.id ? 'sent' : 'received'}`;
            
            const time = new Date(data.timestamp).toLocaleTimeString('ru-RU', {
                hour: '2-digit',
                minute: '2-digit'
            });
            
            div.innerHTML = `
                <div class="message-content">
                    <div>${data.message}</div>
                    <div style="font-size: 11px; color: #666; margin-top: 4px;">${time}</div>
                </div>
            `;
            
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function updateChatList(data) {
            // Update last message in users list if needed
        }

        function showFriendRequests() {
            if (friendRequests.length === 0) {
                alert('Нет новых заявок');
                return;
            }
            
            const request = friendRequests[0];
            if (confirm(`${request.fromUsername} хочет добавить вас в друзья. Принять?`)) {
                socket.emit('acceptFriendRequest', { fromUserId: request.from });
                friendRequests.shift();
                updateRequestsBadge();
            }
        }

        function updateRequestsBadge() {
            const badge = document.getElementById('requestsBadge');
            if (friendRequests.length > 0) {
                badge.textContent = friendRequests.length;
                badge.style.display = 'inline';
            } else {
                badge.style.display = 'none';
            }
        }
    </script>
</body>
</html>
