<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram Clone</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        :root {
            --blue: #0088cc;
            --blue-dark: #006699;
            --bg: #f5f5f5;
            --white: #fff;
            --border: #e0e0e0;
            --text: #333;
            --gray: #666;
            --sent: #dcf8c6;
            --danger: #ff4444;
            --success: #00C851;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; justify-content: center; align-items: center;
        }
        .app {
            width: 100%; height: 100vh; background: #fff;
            display: flex; flex-direction: column;
        }
        @media (min-width: 769px) {
            .app {
                max-width: 1100px; height: 94vh; border-radius: 20px;
                overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); flex-direction: row;
            }
        }

        /* ЛОГИН */
        #loginBox {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 20px;
        }
        #loginBox.hidden { display: none; }
        .login-card {
            background: #fff; padding: 30px; border-radius: 16px;
            text-align: center; max-width: 380px; width: 100%;
        }
        .login-card h1 { font-size: 24px; margin-bottom: 20px; color: #333; }
        .login-card input {
            width: 100%; padding: 14px; border: 2px solid #e0e0e0;
            border-radius: 25px; font-size: 16px; outline: none; margin-bottom: 10px;
        }
        .login-card input:focus { border-color: var(--blue); }
        .avatar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 15px 0; }
        .avatar-opt {
            width: 48px; height: 48px; border-radius: 50%; border: 3px solid transparent;
            font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .avatar-opt:hover { transform: scale(1.1); transition: 0.2s; }
        .avatar-opt.sel { border-color: var(--blue); background: rgba(0,136,204,0.1); }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 25px;
            font-size: 16px; cursor: pointer; background: var(--blue); color: #fff;
        }
        .btn:hover { background: var(--blue-dark); }
        .err { color: var(--danger); margin-top: 10px; font-size: 14px; }

        /* ОСНОВНОЕ ПРИЛОЖЕНИЕ */
        #mainApp { display: none; width: 100%; height: 100%; }
        #mainApp.visible { display: flex; }
        @media (min-width: 769px) { #mainApp.visible { flex-direction: row; } }

        /* САЙДБАР */
        .sidebar {
            width: 100%; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; background: #fff;
        }
        @media (min-width: 769px) { .sidebar { width: 350px; min-width: 350px; } }
        .sidebar-top {
            padding: 15px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border);
        }
        .user-badge { display: flex; align-items: center; gap: 10px; }
        .avatar {
            width: 44px; height: 44px; border-radius: 50%; background: var(--blue);
            color: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0; position: relative;
        }
        .online-dot {
            width: 12px; height: 12px; border-radius: 50%; background: var(--success);
            position: absolute; bottom: 0; right: 0; border: 2px solid #fff;
        }
        .icon-btn {
            background: none; border: none; font-size: 20px;
            color: var(--gray); cursor: pointer; padding: 8px; border-radius: 50%;
        }
        .icon-btn:hover { background: #f0f0f0; }
        .badge {
            position: absolute; top: -2px; right: -2px; background: var(--danger);
            color: #fff; border-radius: 50%; width: 18px; height: 18px;
            font-size: 11px; display: none; align-items: center; justify-content: center;
        }
        .search { padding: 10px 15px; }
        .search input {
            width: 100%; padding: 10px 16px; border: 1px solid var(--border);
            border-radius: 20px; outline: none; font-size: 14px; background: #f0f0f0;
        }
        .tabs { display: flex; border-bottom: 1px solid var(--border); }
        .tab {
            flex: 1; padding: 12px; border: none; background: none;
            cursor: pointer; color: var(--gray); font-size: 14px;
        }
        .tab.active { color: var(--blue); border-bottom: 2px solid var(--blue); }
        .tab-content { display: none; flex: 1; overflow-y: auto; }
        .tab-content.active { display: block; }

        .user-item {
            padding: 12px 15px; display: flex; align-items: center; gap: 12px;
            cursor: pointer; border-bottom: 1px solid #f5f5f5;
        }
        .user-item:hover { background: #f9f9f9; }
        .user-info { flex: 1; }
        .user-info .name { font-weight: 600; font-size: 15px; }
        .user-info .status { font-size: 12px; color: var(--gray); }
        .add-friend-btn {
            background: var(--blue); color: #fff; border: none;
            padding: 6px 14px; border-radius: 15px; font-size: 12px; cursor: pointer;
        }

        /* ОБЛАСТЬ ЧАТА */
        .chat-area {
            flex: 1; display: flex; flex-direction: column;
            background: #e5e5e5; min-width: 0;
        }
        .empty-chat {
            flex: 1; display: flex; justify-content: center;
            align-items: center; color: var(--gray); text-align: center;
        }
        .active-chat { display: none; flex-direction: column; height: 100%; }
        .active-chat.open { display: flex; }
        .chat-top {
            padding: 10px 15px; background: #fff;
            display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border);
        }
        .back-btn-mob { display: none; }
        @media (max-width: 768px) { .back-btn-mob { display: inline; } }
        .msgs {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 5px;
        }
        .msg {
            display: flex; margin-bottom: 5px;
            animation: slide 0.3s ease;
        }
        @keyframes slide { from { opacity: 0; transform: translateY(8px); } }
        .msg.out { justify-content: flex-end; }
        .msg .bubble {
            max-width: 70%; padding: 8px 12px; border-radius: 18px;
            font-size: 14px; line-height: 1.4; word-break: break-word;
        }
        .msg.in .bubble { background: #fff; border-bottom-left-radius: 4px; }
        .msg.out .bubble { background: var(--sent); border-bottom-right-radius: 4px; }
        .msg .meta {
            display: flex; justify-content: flex-end; align-items: center;
            gap: 4px; margin-top: 3px; font-size: 11px; color: var(--gray);
        }
        .msg .check { color: var(--blue); }
        .msg img { max-width: 240px; border-radius: 10px; cursor: pointer; }
        .typing-hint {
            padding: 5px 15px; font-size: 13px; color: var(--gray);
            display: none; align-items: center; gap: 5px;
        }
        .typing-hint .dots { display: flex; gap: 3px; }
        .typing-hint .dots span {
            width: 5px; height: 5px; border-radius: 50%;
            background: var(--gray); animation: dot 1.4s infinite;
        }
        .typing-hint .dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-hint .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot {
            0%, 60%, 100% { opacity: 0.4; }
            30% { opacity: 1; }
        }

        .chat-bottom {
            padding: 10px 15px; background: #fff;
            display: flex; gap: 8px; align-items: center; border-top: 1px solid var(--border);
        }
        .chat-bottom textarea {
            flex: 1; border: none; padding: 10px; background: #f0f0f0;
            border-radius: 20px; outline: none; resize: none;
            font-family: inherit; font-size: 14px; max-height: 100px;
        }
        .send-btn {
            background: var(--blue); color: #fff;
            width: 44px; height: 44px; border-radius: 50%;
            border: none; font-size: 18px; cursor: pointer; flex-shrink: 0;
        }

        /* МОДАЛКИ */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none;
            justify-content: center; align-items: center; z-index: 100;
        }
        .modal.open { display: flex; }
        .modal-box {
            background: #fff; border-radius: 16px; padding: 25px;
            max-width: 450px; width: 90%; max-height: 75vh; overflow-y: auto;
        }
        .modal-box h3 { margin-bottom: 15px; }
        .modal-box .close {
            float: right; background: none; border: none;
            font-size: 22px; cursor: pointer; color: var(--gray);
        }
        .req-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 0; border-bottom: 1px solid #f0f0f0;
        }
        .btn-sm { padding: 5px 12px; border: none; border-radius: 12px; cursor: pointer; font-size: 13px; }
        .btn-yes { background: var(--success); color: #fff; }
        .btn-no { background: var(--danger); color: #fff; margin-left: 5px; }

        /* ПРОСМОТР ФОТО */
        .img-viewer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none;
            justify-content: center; align-items: center; z-index: 200;
        }
        .img-viewer.open { display: flex; }
        .img-viewer img { max-width: 90%; max-height: 90%; }
        .img-viewer .close-img {
            position: absolute; top: 20px; right: 30px;
            color: #fff; font-size: 36px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app">
    <!-- ЭКРАН ВХОДА -->
    <div id="loginBox">
        <div class="login-card">
            <h1>📱 Telegram Clone</h1>
            <input type="text" id="loginUser" placeholder="Имя пользователя" autocomplete="off">
            <input type="password" id="loginPass" placeholder="Пароль" autocomplete="off">
            <div style="font-size:13px;color:#666;margin:10px 0;">Выберите аватар:</div>
            <div class="avatar-grid" id="avatarGrid"></div>
            <button class="btn" id="loginBtn">Войти</button>
            <div class="err" id="loginErr"></div>
        </div>
    </div>

    <!-- ГЛАВНОЕ ПРИЛОЖЕНИЕ -->
    <div id="mainApp">
        <!-- Сайдбар -->
        <div class="sidebar">
            <div class="sidebar-top">
                <div class="user-badge">
                    <div class="avatar" id="myAv"></div>
                    <strong id="myName"></strong>
                </div>
                <div style="display:flex;gap:5px;">
                    <button class="icon-btn" id="friendReqBtn" style="position:relative;">
                        👥<span class="badge" id="reqBadge">0</span>
                    </button>
                    <button class="icon-btn" id="newGroupBtn">➕</button>
                </div>
            </div>
            <div class="search"><input type="text" id="searchField" placeholder="Поиск..."></div>
            <div class="tabs">
                <button class="tab active" data-tab="chats">💬 Чаты</button>
                <button class="tab" data-tab="contacts">👤 Контакты</button>
            </div>
            <div class="tab-content active" id="chatsTab"><div id="chatsList"></div></div>
            <div class="tab-content" id="contactsTab"><div id="usersList"></div></div>
        </div>

        <!-- Область чата -->
        <div class="chat-area">
            <div class="empty-chat" id="emptyChat">
                <div><div style="font-size:64px;opacity:0.3;">💬</div><h2>Выберите чат</h2></div>
            </div>
            <div class="active-chat" id="activeChat">
                <div class="chat-top">
                    <button class="icon-btn back-btn-mob" id="backChatBtn">←</button>
                    <div style="flex:1;">
                        <strong id="chatName"></strong>
                        <div style="font-size:12px;color:#666;" id="chatStatus"></div>
                    </div>
                    <button class="icon-btn" id="callChatBtn">📞</button>
                </div>
                <div class="typing-hint" id="typingBlock">
                    <span id="typingWho"></span>
                    <div class="dots"><span></span><span></span><span></span></div>
                </div>
                <div class="msgs" id="msgsBox"></div>
                <div class="chat-bottom">
                    <button class="icon-btn" id="attachFileBtn">📎</button>
                    <input type="file" id="fileInput" style="display:none;" accept="image/*,audio/*,video/*">
                    <textarea id="msgInput" rows="1" placeholder="Сообщение..."></textarea>
                    <button class="icon-btn" id="recordVoiceBtn">🎤</button>
                    <button class="send-btn" id="sendMsgBtn">➤</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- МОДАЛКА ЗАЯВОК -->
<div class="modal" id="reqModal">
    <div class="modal-box">
        <button class="close" id="closeReqModal">✕</button>
        <h3>Заявки в друзья</h3>
        <div id="reqList"></div>
    </div>
</div>

<!-- МОДАЛКА ГРУППЫ -->
<div class="modal" id="groupModal">
    <div class="modal-box">
        <button class="close" id="closeGroupModal">✕</button>
        <h3>Создать группу</h3>
        <input type="text" id="groupName" placeholder="Название группы" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:20px;margin-bottom:15px;">
        <div id="groupMembers"></div>
        <button class="btn" id="createGroupConfirm" style="margin-top:10px;">Создать</button>
    </div>
</div>

<!-- ПРОСМОТР ФОТО -->
<div class="img-viewer" id="imgViewer">
    <span class="close-img" id="closeImgView">✕</span>
    <img id="bigImage" src="">
</div>

<script>
// ==================== ИНИЦИАЛИЗАЦИЯ ====================
const socket = io({ transports: ['websocket', 'polling'] });

let me = null;
let activeChat = null;
let myFriends = new Map();
let incomingRequests = [];
let peerObj = null;

// Создаём аватарки
['😀','😎','🤖','👽','🦊','🐱','🐶','🦁','🐼','🐨'].forEach(e => {
    const d = document.createElement('div');
    d.className = 'avatar-opt';
    d.textContent = e;
    d.onclick = () => {
        document.querySelectorAll('.avatar-opt').forEach(a => a.classList.remove('sel'));
        d.classList.add('sel');
    };
    document.getElementById('avatarGrid').appendChild(d);
});

// ==================== ЛОГИН ====================
function doLogin() {
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value.trim();
    const av = document.querySelector('.avatar-opt.sel')?.textContent;
    if (!u || !p) {
        document.getElementById('loginErr').textContent = 'Заполните все поля';
        return;
    }
    document.getElementById('loginErr').textContent = '';
    socket.emit('register', { username: u, password: p, avatar: av });
}

document.getElementById('loginBtn').onclick = doLogin;
document.getElementById('loginPass').onkeydown = e => { if (e.key === 'Enter') doLogin(); };

// ==================== SOCKET СОБЫТИЯ ====================
socket.on('registered', user => {
    me = user;
    if (user.friends) user.friends.forEach(f => myFriends.set(f, true));
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('mainApp').classList.add('visible');
    document.getElementById('myName').textContent = user.username;
    document.getElementById('myAv').textContent = user.avatar || user.username[0];
    initPeer();
});

socket.on('loginError', msg => {
    document.getElementById('loginErr').textContent = msg;
});

socket.on('usersList', users => {
    const list = document.getElementById('usersList');
    list.innerHTML = users.filter(u => u.id !== me?.id).map(u => `
        <div class="user-item" id="u-${u.id}">
            <div class="avatar">${u.avatar || u.username[0]}<div class="online-dot" style="display:${u.online?'block':'none'}"></div></div>
            <div class="user-info"><div class="name">${u.username}</div><div class="status">${myFriends.has(u.id)?'👥 Друг':''}</div></div>
            ${!myFriends.has(u.id) ? `<button class="add-friend-btn" onclick="event.stopPropagation();reqFriend('${u.id}')">+</button>` : ''}
        </div>
    `).join('');
    // Клик для открытия чата
    document.querySelectorAll('#usersList .user-item').forEach(el => {
        el.onclick = function() {
            const uid = this.id.replace('u-', '');
            const name = this.querySelector('.name').textContent;
            startChat({ id: uid, username: name });
        };
    });
});

socket.on('userOffline', data => {
    const el = document.getElementById('u-' + data.userId);
    if (el) { const d = el.querySelector('.online-dot'); if (d) d.style.display = 'none'; }
});

socket.on('newFriendRequest', data => {
    incomingRequests.push(data);
    updateBadge();
});

socket.on('friendAdded', user => {
    myFriends.set(user.id, true);
    alert(user.username + ' теперь ваш друг!');
});

socket.on('privateMessage', data => {
    if (activeChat && activeChat.type === 'private' && (activeChat.id === data.from || activeChat.id === data.to)) {
        showMsg(data);
        if (data.from !== me.id) {
            socket.emit('messageDelivered', { messageId: data.id, from: data.from });
            setTimeout(() => socket.emit('messageRead', { messageId: data.id, from: data.from }), 800);
        }
    }
    if (data.from !== me?.id) addToChats({ id: data.from, username: data.fromUsername });
});

socket.on('messageHistory', data => {
    document.getElementById('msgsBox').innerHTML = '';
    data.messages.forEach(m => showMsg(m));
});

socket.on('messageStatusUpdate', data => {
    const el = document.getElementById('msg-' + data.messageId);
    if (el) {
        const c = el.querySelector('.msg-check');
        if (c) { c.textContent = '✓✓'; if (data.status === 'read') c.style.color = '#0088cc'; }
    }
});

socket.on('userTyping', data => {
    const block = document.getElementById('typingBlock');
    if (activeChat && activeChat.id === data.from) {
        document.getElementById('typingWho').textContent = data.username;
        block.style.display = data.isTyping ? 'flex' : 'none';
    }
});

socket.on('groupCreated', group => {
    addGroupToChats(group);
});

socket.on('groupMessage', data => {
    if (activeChat && activeChat.type === 'group' && activeChat.id === data.groupId) {
        showMsg(data, true);
    }
});

socket.on('incomingCall', data => {
    if (confirm(data.username + ' звонит. Принять?')) {
        startMediaCall();
    }
});

socket.on('callEnded', () => {
    alert('Звонок завершён');
});

// ==================== PEERJS ====================
function initPeer() {
    if (peerObj) return;
    peerObj = new Peer(me.id, {
        host: location.hostname,
        port: location.port || (location.protocol === 'https:' ? 443 : 80),
        path: '/peerjs',
        secure: location.protocol === 'https:'
    });
    peerObj.on('call', call => {
        navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then(stream => {
            call.answer(stream);
            call.on('stream', rs => {
                // В реальном приложении здесь бы показывался звонок
                alert('Звонок активен!');
            });
        });
    });
}

function startMediaCall() {
    if (!activeChat || !peerObj) return;
    navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then(stream => {
        const call = peerObj.call(activeChat.id, stream);
        call.on('stream', rs => alert('
